# @package _global_
# LinBreg with warmup LR scheduler and tuned lambda scheduler.
# Run: python train.py experiment=sv/sv_bregman_linbreg_warmup

defaults:
  - sv/sv_bregman_linbreg # inherit parent
  - _self_

module:
  lr_scheduler:
    scheduler:
      _target_: src.utils.schedulers.WarmupExponentialLR
      warmup_epochs: ${oc.eval:'max(1, int(${trainer.max_epochs} * 0.04))'}
      warmup_start_factor: ${oc.eval:'0.0 if "${..extras.interval}" == "step" else 1.0 / (max(1, int(${trainer.max_epochs} * 0.04)) + 1)'}
      gamma: ${oc.eval:'pow(0.0005, 1.0 / (${trainer.max_epochs} - max(1, int(${trainer.max_epochs} * 0.04))))'}
    extras:
      interval: "step"
      frequency: 1

  optimizer:
    _target_: src.callbacks.pruning.bregman.bregman_optimizers.LinBreg
    _partial_: True
    momentum: 0.0
    lr: 1e-1
