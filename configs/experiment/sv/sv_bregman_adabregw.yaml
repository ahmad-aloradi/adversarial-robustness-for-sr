# @package _global_

# AdaBreg with decoupled weight decay (AdamW-style).
# Weight decay is applied after the proximal step, keeping it independent
# from the subgradient accumulation.

defaults:
  - sv/sv_bregman_adabreg
  - _self_

tags:
  [
    '${oc.eval:''"${datamodule.dataset.data_dir}".split("/")[-1]''}',
    "Bregman_learning",
    "sv",
    "AdabregW",
  ]

module:
  optimizer:
    _target_: src.callbacks.pruning.bregman.bregman_optimizers.AdaBregW
    _partial_: true
    lr: 1e-2
    weight_decay: 1e-2
