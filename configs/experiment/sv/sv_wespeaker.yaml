# @package _global_

# WeSpeaker-exact training configuration for CNCeleb
# Matches WeSpeaker's ECAPA-TDNN_GLOB_c512 recipe from:
# https://github.com/wenet-e2e/wespeaker/tree/master/examples/cnceleb/v2
#
# Key parameters (150 epochs):
# - Model: ECAPA_TDNN_GLOB_c512 (not c1024)
# - LR: 0.1 -> 0.00005 via ExponentialDecrease with 6-epoch warmup from zero
# - Margin: 0.0 -> 0.2 exponential increase from epoch 20 to 40
# - Batch size: 128
# - SGD with momentum=0.9, nesterov=True, weight_decay=1e-4
# - No early stopping (train full 150 epochs)
# - Checkpoint averaging: last 10 checkpoints
#
# Target: EER <= 8.5% on CNCeleb eval (WeSpeaker reference: 7.879%)
#
# Usage:
#   python train.py experiment=sv/sv_wespeaker datamodule=datasets/cnceleb

defaults:
  - /module/sv_model: wespeaker_ecapa_tdnn.yaml
  - /module/scoring: as_norm
  - override /callbacks: default.yaml
  - override /datamodule: datasets/cnceleb.yaml
  - override /module: sv.yaml
  - override /trainer: gpu.yaml
  - override /logger: tensorboard.yaml

tags:
  [
    "wespeaker",
    '${oc.eval:''"${datamodule.dataset.data_dir}".split("/")[-1]''}',
    "sv",
  ]
seed: 42

trainer:
  max_epochs: 150 # WeSpeaker uses 150 epochs
  min_epochs: 150 # No early stopping - train full duration
  gradient_clip_val: 1.0
  num_sanity_val_steps: 0

callbacks:
  model_checkpoint:
    mode: max
    monitor: ${replace:"valid/__metric__"}
    save_top_k: 10 # Save last 10 checkpoints for averaging
    every_n_epochs: 5 # WeSpeaker: save_epoch_interval=5
  checkpoint_averaging:
    _target_: src.callbacks.checkpoint_averaging.CheckpointAveraging
    num_checkpoints: 10
    output_filename: averaged_top{num}.ckpt
  early_stopping: null # WeSpeaker trains full 150 epochs without early stopping
  # Progressive margin scheduler (WeSpeaker-exact)
  # WeSpeaker: margin 0.0->0.2, exponential increase, epoch 20-40
  margin_scheduler:
    _target_: src.callbacks.margin_scheduler.ProgressiveMarginScheduler
    initial_margin: 0.0
    final_margin: 0.2
    start_epoch: 20 # WeSpeaker: increase_start_epoch=20
    warmup_epochs: 20 # WeSpeaker: fix_start_epoch=40, so 40-20=20 epochs
    increase_type: exp # WeSpeaker: increase_type='exp'

datamodule:
  dataset:
    segment_duration: 2.0
    max_duration: 2.0
    use_pre_segmentation: False
    # # Larger batch via PKSpeaker sampling (16 speakers × 8 utterances = 128)
    # batch_sampler:
    #   num_speakers: 16
    #   num_utterances: 8

  loaders:
    train:
      batch_size: 128
    val:
      batch_size: 128
    test:
      batch_size: 8
    enrollment:
      batch_size: 8

module:
  # Start with margin=0.0 (will be increased by margin_scheduler callback)
  criterion:
    aam:
      _target_: speechbrain.nnet.losses.LogSoftmaxWrapper
      loss_fn:
        _target_: speechbrain.nnet.losses.AdditiveAngularMargin
        margin: 0.0
        scale: 32.0

  # WeSpeaker-exact LR schedule: warmup + exponential decay
  # WeSpeaker formula: lr = initial_lr * exp((epoch/total) * log(final_lr/initial_lr))
  # For our gamma-based scheduler: gamma = (final_lr/initial_lr)^(1/(epochs-warmup))
  # WeSpeaker: initial_lr=0.1, final_lr=0.00005, warmup=6, epochs=150
  # gamma = (0.00005/0.1)^(1/144) = 0.0005^(1/144) = 0.9479
  lr_scheduler:
    scheduler:
      _target_: src.utils.schedulers.WarmupExponentialLR
      warmup_epochs: 6 # WeSpeaker: warm_up_epoch=6
      warmup_start_factor: 0.0 # WeSpeaker: warm_from_zero=True
      gamma: 0.9486 # Decay to 0.00005 final LR: (0.00005/0.1)^(1/144)
    extras:
      interval: "epoch"
      frequency: ${trainer.check_val_every_n_epoch}

  # WeSpeaker-exact SGD optimizer
  optimizer:
    _target_: torch.optim.SGD
    _partial_: True
    lr: 0.1
    momentum: 0.9
    nesterov: True
    weight_decay: 1.0e-4

  ### Data for augmentation ###
  data_augmentation:
    noise_dataset_url: https://www.dropbox.com/scl/fi/a09pj97s5ifan81dqhi4n/noises.zip?rlkey=j8b0n9kdjdr32o1f06t0cw5b7&dl=1
    rir_dataset_url: https://www.dropbox.com/scl/fi/linhy77c36mu10965a836/RIRs.zip?rlkey=pg9cu8vrpn2u173vhiqyu743u&dl=1
    data_folder_rir_noises: ${paths.data_dir}/RIRS_NOISES
    noise_annotation: ${hydra:runtime.output_dir}/noise.csv
    rir_annotation: ${hydra:runtime.output_dir}/reverb.csv

    prepare_noise_data:
      _target_: speechbrain.augment.preparation.prepare_dataset_from_URL
      URL: ${module.data_augmentation.noise_dataset_url}
      dest_folder: ${module.data_augmentation.data_folder_rir_noises}/noise
      ext: wav
      csv_file: ${module.data_augmentation.noise_annotation}

    prepare_rir_data:
      _target_: speechbrain.augment.preparation.prepare_dataset_from_URL
      URL: ${module.data_augmentation.rir_dataset_url}
      dest_folder: ${module.data_augmentation.data_folder_rir_noises}/rir
      ext: wav
      csv_file: ${module.data_augmentation.rir_annotation}

    augmentations:
      wav_augmenter:
        _target_: src.modules.augmentation.GPUAugmenter
        sample_rate: ${datamodule.dataset.sample_rate}
        concat_original: true
        # Transforms applied in order - ordering controlled here, not in code
        transforms:
          # 1. Speed perturbation (applied first - changes signal length)
          - _target_: src.modules.augmentation.SpeedPerturb
            sample_rate: ${datamodule.dataset.sample_rate}
            speed_factors: [0.9, 1.0, 1.1]
            p: 1.0
          # 2. Reverb with normalization (before noise to avoid amplifying it)
          - _target_: src.modules.augmentation.NormalizedReverb
            ir_csv: ${module.data_augmentation.rir_annotation}
            sample_rate: ${datamodule.dataset.sample_rate}
            p: 0.6
            normalize: true
          # 3. Background noise
          - _target_: src.modules.augmentation.NoiseFromCSV
            noise_csv: ${module.data_augmentation.noise_annotation}
            min_snr_db: 0
            max_snr_db: 15
            p: 0.6

logger:
  wandb:
    tags: ${tags}
    group: ${oc.eval:"'${datamodule.dataset.data_dir}'.split('/')[-1]"}
