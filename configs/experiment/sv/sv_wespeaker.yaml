# @package _global_

# WeSpeaker-style training configuration for CNCeleb
# Implements optimizations from WeSpeaker's ECAPA-TDNN recipe:
# - Large batch size (128) with PKSpeaker sampling
# - SGD optimizer with high LR (0.1) + momentum
# - Warmup + exponential decay LR schedule
# - Progressive margin scheduling (0.0 -> 0.2)
# - Speed perturbation augmentation
#
# All schedule parameters are computed relative to max_epochs using oc.eval,
# so you can adjust training length and everything scales automatically.
# Based on WeSpeaker 150-epoch recipe proportions:
# - LR warmup: 4% of training (6/150)
# - LR decay: gamma computed to reach ~0.0001 final LR
# - Margin start: 14% of training (20/150)
# - Margin warmup: 26% of training (ends at 40%)
#
# Checkpoint averaging: save_top_k=10 for post-training model averaging
# (see scripts/average_checkpoints.py or Plan 02 for averaging workflow)
#
# Usage:
#   python train.py experiment=sv/sv_wespeaker datamodule=datasets/cnceleb
#   python train.py experiment=sv/sv_wespeaker trainer.max_epochs=30  # shorter run

defaults:
  - /module/sv_model: wespeaker_ecapa_tdnn.yaml
  - override /callbacks: default.yaml
  - override /datamodule: datasets/cnceleb.yaml
  - override /module: sv.yaml
  - override /trainer: gpu.yaml
  - override /logger: tensorboard.yaml

tags:
  [
    "wespeaker",
    '${oc.eval:''"${datamodule.dataset.data_dir}".split("/")[-1]''}',
    "sv",
  ]
seed: 42

trainer:
  max_epochs: 50 # Change this to adjust training length (all schedules auto-scale)
  min_epochs: ${oc.eval:'int(${trainer.max_epochs} * 0.2)'} # 20% minimum
  gradient_clip_val: 1.0
  num_sanity_val_steps: 0

callbacks:
  model_checkpoint:
    mode: max
    monitor: ${replace:"valid/__metric__"}
    save_top_k: 10 # Save last 10 checkpoints for averaging (WeSpeaker uses avg of 10)
  early_stopping:
    mode: max
    monitor: ${replace:"valid/__metric__"}
    patience: ${oc.eval:'int(${trainer.max_epochs} * 0.3)'} # ~30% of epochs
  # Progressive margin scheduler (WeSpeaker-style, auto-scaled to max_epochs)
  # WeSpeaker: margin starts at 14%, warmup 26% of training (ends at 40%)
  margin_scheduler:
    _target_: src.callbacks.margin_scheduler.ProgressiveMarginScheduler
    initial_margin: 0.0
    final_margin: 0.2
    start_epoch: ${oc.eval:'int(${trainer.max_epochs} * 0.14)'} # 14% into training
    warmup_epochs: ${oc.eval:'int(${trainer.max_epochs} * 0.26)'} # 26% duration (ends at 40%)

datamodule:
  dataset:
    max_duration: 3.0
    # # Larger batch via PKSpeaker sampling (16 speakers × 8 utterances = 128)
    # batch_sampler:
    #   num_speakers: 16
    #   num_utterances: 8

  loaders:
    train:
      batch_size: 128
    val:
      batch_size: 128
    test:
      batch_size: 8
    enrollment:
      batch_size: 8

module:
  normalize_test_scores: True
  subtract_mean: True # subtract global mean from embeddings before scoring (centering)

  # Start with margin=0.0 (will be increased by margin_scheduler callback)
  criterion:
    aam:
      _target_: speechbrain.nnet.losses.LogSoftmaxWrapper
      loss_fn:
        _target_: speechbrain.nnet.losses.AdditiveAngularMargin
        margin: 0.0
        scale: 32.0

  # WeSpeaker-style LR schedule: warmup + exponential decay (auto-scaled)
  # LR: 0.0 -> 0.1 (warmup, 4% of epochs) -> ~0.0001 (gamma decay)
  # gamma computed to reach final_lr=0.0001 from initial_lr=0.1
  lr_scheduler:
    scheduler:
      _target_: src.utils.schedulers.WarmupExponentialLR
      warmup_epochs: ${oc.eval:'max(1, int(${trainer.max_epochs} * 0.04))'} # 4% warmup
      warmup_start_factor: 0.0 # WeSpeaker: warm_from_zero=True
      gamma: ${oc.eval:'pow(0.001, 1.0 / (${trainer.max_epochs} - max(1, int(${trainer.max_epochs} * 0.04))))'} # decay to 0.0001
    extras:
      interval: "epoch"
      frequency: 1

  # WeSpeaker-style SGD optimizer
  optimizer:
    _target_: torch.optim.SGD
    _partial_: True
    lr: 0.1
    momentum: 0.9
    nesterov: True
    weight_decay: 1.0e-4

  ### Data for augmentation ###
  data_augmentation:
    noise_dataset_url: https://www.dropbox.com/scl/fi/a09pj97s5ifan81dqhi4n/noises.zip?rlkey=j8b0n9kdjdr32o1f06t0cw5b7&dl=1
    rir_dataset_url: https://www.dropbox.com/scl/fi/linhy77c36mu10965a836/RIRs.zip?rlkey=pg9cu8vrpn2u173vhiqyu743u&dl=1
    data_folder_rir_noises: ${paths.data_dir}/RIRS_NOISES
    noise_annotation: ${hydra:runtime.output_dir}/noise.csv
    rir_annotation: ${hydra:runtime.output_dir}/reverb.csv

    prepare_noise_data:
      _target_: speechbrain.augment.preparation.prepare_dataset_from_URL
      URL: ${module.data_augmentation.noise_dataset_url}
      dest_folder: ${module.data_augmentation.data_folder_rir_noises}/noise
      ext: wav
      csv_file: ${module.data_augmentation.noise_annotation}

    prepare_rir_data:
      _target_: speechbrain.augment.preparation.prepare_dataset_from_URL
      URL: ${module.data_augmentation.rir_dataset_url}
      dest_folder: ${module.data_augmentation.data_folder_rir_noises}/rir
      ext: wav
      csv_file: ${module.data_augmentation.rir_annotation}

    augmentations:
      wav_augmenter:
        _target_: src.modules.augmentation.GPUAugmenter
        sample_rate: ${datamodule.dataset.sample_rate}
        concat_original: true
        # Transforms applied in order - ordering controlled here, not in code
        transforms:
          # 1. Speed perturbation (applied first - changes signal length)
          - _target_: src.modules.augmentation.SpeedPerturb
            sample_rate: ${datamodule.dataset.sample_rate}
            speed_factors: [0.9, 1.0, 1.1]
            p: 1.0
          # 2. Reverb with normalization (before noise to avoid amplifying it)
          - _target_: src.modules.augmentation.NormalizedReverb
            ir_csv: ${module.data_augmentation.rir_annotation}
            sample_rate: ${datamodule.dataset.sample_rate}
            p: 0.6
            normalize: true
          # 3. Background noise
          - _target_: src.modules.augmentation.NoiseFromCSV
            noise_csv: ${module.data_augmentation.noise_annotation}
            min_snr_db: 0
            max_snr_db: 15
            p: 0.5
          # 4. Frequency dropout (band-stop filter)
          - _target_: torch_audiomentations.BandStopFilter
            min_center_frequency: 200
            max_center_frequency: 4000
            min_bandwidth_fraction: 0.5
            max_bandwidth_fraction: 1.5
            p: 0.5
            mode: per_example
          # 5. Time chunk dropout (shorter width for wespeaker)
          - _target_: torch_audiomentations.SpliceOut
            num_time_intervals: 5
            max_width: 25
            p: 0.5
            mode: per_example

logger:
  wandb:
    tags: ${tags}
    group: ${oc.eval:"'${datamodule.dataset.data_dir}'.split('/')[-1]"}
