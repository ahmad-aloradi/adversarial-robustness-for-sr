# @package _global_

# AdaBreg with coupled L2 regularization (standard Adam-style weight decay).
# L2 penalty is added to gradients before Adam moment updates, so it flows
# through the subgradient accumulation — unlike AdaBregW which applies decay
# after the proximal step (decoupled).

defaults:
  - sv/sv_bregman_adabreg
  - _self_

tags:
  [
    '${oc.eval:''"${datamodule.dataset.data_dir}".split("/")[-1]''}',
    "Bregman_learning",
    "sv",
    "AdabregL2",
  ]

module:
  optimizer:
    _target_: src.callbacks.pruning.bregman.bregman_optimizers.AdaBregL2
    _partial_: true
    lr: 1e-2
    weight_decay: 5e-5
