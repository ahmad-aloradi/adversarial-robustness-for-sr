# @package _global_

# Fixed-lambda LinBreg: no lambda scheduler, static regularization.
# Lambda is still set via _bregman_lambda from the base config.

defaults:
  - sv/sv_bregman_linbreg
  - _self_

_bregman_lambda: ${bregman_lambda:LinBreg,${_bregman_target_sparsity},fixed_lambda}
_bregman_min_lambda: ${bregman_lambda:LinBreg,${_bregman_target_sparsity},fixed_lambda}

callbacks:
  model_pruning:
    lambda_scheduler: null
