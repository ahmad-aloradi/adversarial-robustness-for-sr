# @package _global_

# CNCeleb magnitude pruning experiment config
#
# Combines the proven sv_wespeaker training recipe (CNCeleb baseline: 8.86% EER)
# with magnitude pruning from sv_pruning_mag_struct.yaml.
#
# Key differences from sv_pruning_mag_struct.yaml:
# - Uses CNCeleb dataset (not VoxCeleb)
# - Uses SGD optimizer (not AdamW) from sv_wespeaker recipe
# - Uses WarmupExponentialLR scheduler (not ReduceLROnPlateau)
#   ReduceLROnPlateau relies on validation metric monitoring which is suppressed
#   during pruning ramp, so it will NOT work correctly. WarmupExponentialLR is
#   epoch-based and works regardless of validation suppression.
# - Uses unified max_epochs=50 for fair baseline/Bregman/pruning comparison
# - Keeps all sv_wespeaker augmentation settings and margin scheduling
#
# Usage:
#   python src/train.py experiment=sv/sv_pruning_mag_struct_cnceleb
#   python src/train.py experiment=sv/sv_pruning_mag_struct_cnceleb callbacks.model_pruning.final_amount=0.70 seed=42

defaults:
  - /module/sv_model: wespeaker_ecapa_tdnn.yaml
  - /module/scoring: as_norm
  - override /callbacks: default.yaml
  - override /datamodule: datasets/cnceleb.yaml
  - override /module: sv.yaml
  - override /trainer: gpu.yaml
  - override /logger: tensorboard.yaml

tags:
  [
    "wespeaker",
    '${oc.eval:''"${datamodule.dataset.data_dir}".split("/")[-1]''}',
    "sv",
    "pruning",
    "ln_structured",
    "cnceleb",
  ]
seed: 42

trainer:
  max_epochs: 50
  min_epochs: ${oc.eval:'int(${trainer.max_epochs} * 0.2)'}
  gradient_clip_val: 1.0
  num_sanity_val_steps: 0

callbacks:
  model_checkpoint:
    mode: max
    monitor: ${replace:"valid/__metric__"}
    save_top_k: 5 # Save top-5 checkpoints for averaging
    every_n_epochs: 1
  checkpoint_averaging:
    _target_: src.callbacks.checkpoint_averaging.CheckpointAveraging
    num_checkpoints: 5
    output_filename: averaged_top{num}.ckpt
  early_stopping:
    mode: max
    monitor: ${replace:"valid/__metric__"}
    patience: ${oc.eval:'int(${trainer.max_epochs} * 0.3)'}

  # Progressive margin scheduler (same as sv_wespeaker)
  margin_scheduler:
    _target_: src.callbacks.margin_scheduler.ProgressiveMarginScheduler
    initial_margin: 0.0
    final_margin: 0.2
    start_epoch: ${oc.eval:'int(${trainer.max_epochs} * 0.133)'} # 13.3% into training
    warmup_epochs: ${oc.eval:'int(${trainer.max_epochs} * 0.133)'} # 13.3% duration
    increase_type: exp

  # Magnitude pruning callback
  model_pruning:
    _target_: src.callbacks.pruning.prune.MagnitudePruner
    pruning_fn: ln_structured
    amount: 0.9
    use_global_unstructured: false
    apply_pruning: true
    make_pruning_permanent: true
    use_lottery_ticket_hypothesis: false
    resample_parameters: false
    parameters_to_prune: null
    pruning_dim: 1
    pruning_norm: 1
    verbose: 1
    pruning_trigger: epoch_start
    scheduled_pruning: true
    final_amount: 0.9
    epochs_to_ramp: 10
    save_when_sparser_than: 0.9
    schedule_type: constant

datamodule:
  dataset:
    segment_duration: 3.0
    max_duration: 3.0
    use_pre_segmentation: true
  # Auto-scale num_classes for virtual speakers
  num_classes: ${oc.eval:'(${module.data_augmentation.augmentations.wav_augmenter.speed_perturb.virtual_speakers}) and (${datamodule._base_num_classes} * len(${module.data_augmentation.augmentations.wav_augmenter.speed_perturb.speed_factors})) or ${datamodule._base_num_classes}'}

  loaders:
    train:
      batch_size: 128
    valid:
      batch_size: 128
    test:
      batch_size: 8
    enrollment:
      batch_size: 8

module:
  # Start with margin=0.0 (will be increased by margin_scheduler callback)
  criterion:
    aam:
      _target_: speechbrain.nnet.losses.LogSoftmaxWrapper
      loss_fn:
        _target_: speechbrain.nnet.losses.AdditiveAngularMargin
        margin: 0.0
        scale: 32.0

  # WeSpeaker-style LR schedule: warmup + exponential decay (auto-scaled)
  lr_scheduler:
    scheduler:
      _target_: src.utils.schedulers.WarmupExponentialLR
      warmup_epochs: ${oc.eval:'max(1, int(${trainer.max_epochs} * 0.04))'} # 4% warmup
      warmup_start_factor: 0.0
      gamma: ${oc.eval:'pow(0.0005, 1.0 / (${trainer.max_epochs} - max(1, int(${trainer.max_epochs} * 0.04))))'} # decay to 0.00005
    extras:
      interval: "epoch"
      frequency: ${trainer.check_val_every_n_epoch}

  # WeSpeaker-exact SGD optimizer
  optimizer:
    _target_: torch.optim.SGD
    _partial_: True
    lr: 0.1
    momentum: 0.9
    nesterov: true
    weight_decay: 1.0e-4

  ### Data augmentation (same as sv_wespeaker) ###
  data_augmentation:
    noise_dataset_url: https://www.dropbox.com/scl/fi/a09pj97s5ifan81dqhi4n/noises.zip?rlkey=j8b0n9kdjdr32o1f06t0cw5b7&dl=1
    rir_dataset_url: https://www.dropbox.com/scl/fi/linhy77c36mu10965a836/RIRs.zip?rlkey=pg9cu8vrpn2u173vhiqyu743u&dl=1
    data_folder_rir_noises: ${paths.data_dir}/RIRS_NOISES
    noise_annotation: ${hydra:runtime.output_dir}/noise.csv
    rir_annotation: ${hydra:runtime.output_dir}/reverb.csv

    prepare_noise_data:
      _target_: speechbrain.augment.preparation.prepare_dataset_from_URL
      URL: ${module.data_augmentation.noise_dataset_url}
      dest_folder: ${module.data_augmentation.data_folder_rir_noises}/noise
      ext: wav
      csv_file: ${module.data_augmentation.noise_annotation}

    prepare_rir_data:
      _target_: speechbrain.augment.preparation.prepare_dataset_from_URL
      URL: ${module.data_augmentation.rir_dataset_url}
      dest_folder: ${module.data_augmentation.data_folder_rir_noises}/rir
      ext: wav
      csv_file: ${module.data_augmentation.rir_annotation}

    augmentations:
      wav_augmenter:
        _target_: src.modules.augmentation.GPUAugmenter
        sample_rate: ${datamodule.dataset.sample_rate}
        concat_original: true
        # Speed perturbation with virtual speakers
        speed_perturb:
          _target_: src.modules.augmentation.SpeedPerturb
          sample_rate: ${datamodule.dataset.sample_rate}
          speed_factors: [0.9, 1.0, 1.1]
          virtual_speakers: true
          num_base_classes: ${datamodule._base_num_classes}
          p: 1.0
        # Noise and reverb are mutually exclusive (WeSpeaker strategy)
        transforms:
          - _target_: src.modules.augmentation.MutuallyExclusive
            p: 1.0
            transforms:
              - _target_: src.modules.augmentation.NormalizedReverb
                ir_csv: ${module.data_augmentation.rir_annotation}
                sample_rate: ${datamodule.dataset.sample_rate}
                p: 1.0
                normalize: true
              - _target_: src.modules.augmentation.NoiseFromCSV
                noise_csv: ${module.data_augmentation.noise_annotation}
                min_snr_db: 0
                max_snr_db: 15
                p: 1.0

logger:
  wandb:
    tags: ${tags}
    group: ${oc.eval:"'${datamodule.dataset.data_dir}'.split('/')[-1]"}
