# @package _global_
#
# SOTA recipe for ASVSpoof5 Track 1 CM detection.
# Based on published top-performing systems:
# - Adam optimizer with cosine annealing (XMUspeech)
# - RIR + MUSAN + FreqMask augmentation (Temporal Variability paper)
# - Codec augmentation for eval domain gap
# - 10:1 bonafide:spoof CE weighting
#
# Usage:
#   python -m src.train experiment=cm/cm_sota
#   python -m src.train experiment=cm/cm_sota module/cm=rawnet2  # RawNet2 ablation

defaults:
  - /module/cm: aasist #aasist.yaml rawnet2.yaml
  - override /callbacks: default.yaml
  - override /datamodule: datasets/asvspoof5.yaml
  - override /module: cm.yaml
  - override /trainer: gpu.yaml
  - override /logger: tensorboard.yaml

tags:
  [
    '${oc.eval:''"${datamodule.dataset.data_dir}".split("/")[-1]''}',
    "Countermeasures",
    "SOTA",
  ]
seed: 42

trainer:
  max_epochs: 40
  min_epochs: 20
  gradient_clip_val: 1.0
  num_sanity_val_steps: 0

callbacks:
  model_checkpoint:
    mode: min
    monitor: valid/minDCF
    save_top_k: 5
    every_n_epochs: 1
  checkpoint_averaging:
    _target_: src.callbacks.checkpoint_averaging.CheckpointAveraging
    num_checkpoints: ${callbacks.model_checkpoint.save_top_k}
    output_filename: averaged_top{num}.ckpt
  early_stopping:
    mode: min
    monitor: valid/minDCF
    patience: 30
  epoch_summary_logger:
    monitor: valid/minDCF

datamodule:
  dataset:
    segment_duration: 4.0   # Match official baseline (4s = 64000 samples)
    max_duration: 4.0
    use_pre_segmentation: True
    cm_mode: True
    eval_tracks: "1"

  _base_num_classes: 2
  num_classes: 2

  loaders:
    train:
      batch_size: 32
    valid:
      batch_size: 4
    test:
      batch_size: 4
    enrollment:
      batch_size: 1

module:
  # 10:1 bonafide:spoof weighting (SOTA recipe)
  criterion:
    class_weights: [1.0, 9.0]

  # Adam optimizer (SOTA CM systems use Adam, not SGD)
  # Clear SGD-specific params from base cm.yaml
  optimizer:
    _target_: torch.optim.Adam
    _partial_: True
    lr: 1.0e-4
    betas: [0.9, 0.999]
    weight_decay: 1.0e-4
    momentum: null
    nesterov: null

  # Cosine annealing LR schedule
  # Clear WarmupExponentialLR-specific params from base cm.yaml
  lr_scheduler:
    scheduler:
      _target_: torch.optim.lr_scheduler.CosineAnnealingLR
      T_max: ${trainer.max_epochs}
      eta_min: 1.0e-6
      warmup_epochs: null
      warmup_start_factor: null
      gamma: null
    extras:
      interval: "epoch"
      frequency: ${trainer.check_val_every_n_epoch}

  ### Data for augmentation ###
  data_augmentation:
    noise_dataset_url: https://www.dropbox.com/scl/fi/a09pj97s5ifan81dqhi4n/noises.zip?rlkey=j8b0n9kdjdr32o1f06t0cw5b7&dl=1
    rir_dataset_url: https://www.dropbox.com/scl/fi/linhy77c36mu10965a836/RIRs.zip?rlkey=pg9cu8vrpn2u173vhiqyu743u&dl=1
    data_folder_rir_noises: ${paths.data_dir}/RIRS_NOISES
    noise_annotation: ${hydra:runtime.output_dir}/noise.csv
    rir_annotation: ${hydra:runtime.output_dir}/reverb.csv

    prepare_noise_data:
      _target_: speechbrain.augment.preparation.prepare_dataset_from_URL
      URL: ${module.data_augmentation.noise_dataset_url}
      dest_folder: ${module.data_augmentation.data_folder_rir_noises}/noise
      ext: wav
      csv_file: ${module.data_augmentation.noise_annotation}

    prepare_rir_data:
      _target_: speechbrain.augment.preparation.prepare_dataset_from_URL
      URL: ${module.data_augmentation.rir_dataset_url}
      dest_folder: ${module.data_augmentation.data_folder_rir_noises}/rir
      ext: wav
      csv_file: ${module.data_augmentation.rir_annotation}

    augmentations:
      wav_augmenter:
        _target_: src.modules.augmentation.GPUAugmenter
        sample_rate: ${datamodule.dataset.sample_rate}
        concat_original: true
        # Speed perturbation WITHOUT virtual speakers for CM (binary labels)
        speed_perturb:
          _target_: src.modules.augmentation.SpeedPerturb
          sample_rate: ${datamodule.dataset.sample_rate}
          speed_factors: [0.9, 1.0, 1.1]
          virtual_speakers: false
          num_base_classes: ${datamodule._base_num_classes}
          p: 1.0
        transforms:
          # 1. Noise OR reverb (mutually exclusive)
          - _target_: src.modules.augmentation.MutuallyExclusive
            p: 1.0
            transforms:
              - _target_: src.modules.augmentation.NormalizedReverb
                ir_csv: ${module.data_augmentation.rir_annotation}
                sample_rate: ${datamodule.dataset.sample_rate}
                p: 1.0
                normalize: true
              - _target_: src.modules.augmentation.NoiseFromCSV
                noise_csv: ${module.data_augmentation.noise_annotation}
                min_snr_db: 0
                max_snr_db: 15
                p: 1.0
          # 2. Codec augmentation (bridges train/eval domain gap)
          - _target_: src.modules.augmentation.CodecAugmentation
            sample_rate: ${datamodule.dataset.sample_rate}
            p: 0.3
          # 3. FreqMask (simulates bandwidth limitation, high impact per published results)
          - _target_: src.modules.augmentation.FreqMask
            sample_rate: ${datamodule.dataset.sample_rate}
            cutoff_freqs: [4000, 5000, 6000, 7000]
            p: 0.3

logger:
  wandb:
    tags: ${tags}
    group: ${oc.eval:"'${datamodule.dataset.data_dir}'.split('/')[-1]"}
