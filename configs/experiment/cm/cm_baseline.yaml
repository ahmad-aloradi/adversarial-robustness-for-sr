# @package _global_

defaults:
  - /module/cm: rawnet2.yaml
  - override /callbacks: default.yaml
  - override /datamodule: datasets/asvspoof5.yaml
  - override /module: cm.yaml
  - override /trainer: gpu.yaml
  - override /logger: tensorboard.yaml

tags:
  [
    '${oc.eval:''"${datamodule.dataset.data_dir}".split("/")[-1]''}',
    "Countermeasures",
  ]
seed: 42

trainer:
  max_epochs: 20 # Change this to adjust training length (all schedules auto-scale)
  min_epochs: ${oc.eval:'int(${trainer.max_epochs} * 0.2)'} # 20% minimum
  gradient_clip_val: 1.0
  num_sanity_val_steps: 0

callbacks:
  model_checkpoint:
    mode: min
    monitor: valid/minDCF
    save_top_k: 3 # Save top-k checkpoints for averaging
    every_n_epochs: 1
  checkpoint_averaging:
    _target_: src.callbacks.checkpoint_averaging.CheckpointAveraging
    num_checkpoints: ${callbacks.model_checkpoint.save_top_k} # Average the top K checkpoints
    output_filename: averaged_top{num}.ckpt
  early_stopping:
    mode: min
    monitor: valid/minDCF
    patience: ${oc.eval:'int(${trainer.max_epochs} * 0.3)'} # ~30% of epochs
  epoch_summary_logger:
    monitor: valid/minDCF

datamodule:
  dataset:
    segment_duration: 3.0
    max_duration: 3.0
    use_pre_segmentation: True
    cm_mode: True          # Map 'key' column to binary class_id (bonafide=1, spoof=0)
    eval_tracks: "1"       # Track 1 only (CM detection)

  # Binary classification: bonafide (1) vs spoof (0)
  _base_num_classes: 2
  num_classes: 2

  loaders:
    train:
      batch_size: 128
    valid:
      batch_size: 128
    test:
      batch_size: 8
    enrollment:
      batch_size: 8

  ### Data for augmentation ###
  # Augmentation disabled for baseline. See cm_sota.yaml for full augmentation pipeline.

