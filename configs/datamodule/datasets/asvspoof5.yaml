_target_: src.datamodules.asvspoof_datamodule.ASVSpoofDataModule

dataset:
  # Base directory for the combined CNCeleb datasets
  data_dir: ${paths.data_dir}/asvspoof5

  # Base search directory where pre-generated metadata files can be found
  # Automatically selects vad_metadata if vad.enabled=true, else metadata
  base_search_dir: ${.data_dir}/metadata

  # Directory where artifacts like CSVs will be stored for this experiment
  artifacts_dir: ${hydra:runtime.output_dir}/asvspoof5_artifacts

  # --- Data Preparation Settings ---
  protocol_dir: ${.data_dir}/protocols
  files_extension: .wav
  apply_preemphasis: true
  sep: "|"
  sample_rate: 16000
  min_duration: 0.5
  max_speakers: null # Keep all speakers; set to int to cap by total duration

  # tracks option: "1", "2", or "both"
  eval_tracks: both

  # --- Segmentation Strategy ---
  # - true: Generate segments with fixed boundaries in CSV (deterministic, full coverage)
  # - false: Store full file metadata, apply random cropping during training (augmentation)
  use_pre_segmentation: true

  # Segmentation parameters (only used if use_pre_segmentation=true)
  segment_duration: 3.0 # Duration of each segment in seconds
  segment_overlap: 0.0 # Overlap between segments in seconds (0.0 = non-overlapping)
  min_segment_duration: 1.0 # Minimum segment duration to be included

  # Random cropping parameter (only used if use_pre_segmentation=false)
  max_duration: 3.0 # Maximum duration for random cropping during training

transforms: null

# Base speaker count before speed perturbation expansion
_base_num_classes: ${oc.eval:'min(${.dataset.max_speakers}, 400) if ${.dataset.max_speakers} != None else 400'}
num_classes: ${._base_num_classes}

loaders:
  train:
    batch_size: 32
    shuffle: True
    num_workers: 8
    drop_last: True
    pin_memory: True
    persistent_workers: True
    prefetch_factor: 3

  valid:
    batch_size: 32
    shuffle: False
    num_workers: 8
    drop_last: False
    pin_memory: True
    persistent_workers: True
    prefetch_factor: 3

  test:
    batch_size: 32
    shuffle: False
    num_workers: 4
    drop_last: False
    pin_memory: True

  enrollment:
    batch_size: 2
    shuffle: False
    num_workers: 4
    drop_last: False
    pin_memory: True
