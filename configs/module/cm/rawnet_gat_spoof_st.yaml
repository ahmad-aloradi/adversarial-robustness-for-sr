# @package module.model
audio_processor:
  # The audio_processor processor seems to implemented in the encoder itself
  _target_: torch.nn.Identity

audio_processor_normalizer:
  _target_: torch.nn.Identity

audio_encoder:
  _target_: torch.nn.Sequential
  _args_:
    - _target_: src.modules.models.rawnet_gat_spoof_st.RawNetGatSpoofST
      first_conv: 128
      filts: [70, [1, 32], [32, 32], [32, 64], [64, 64]]
    - _target_: src.utils.torch_utils.SelectFromTuple
      _args_: [1]

classifier:
  _target_: torch.nn.Identity
