# @package module.model
audio_processor:
  _target_: speechbrain.lobes.features.Fbank
  sample_rate: ${datamodule.dataset.sample_rate}
  deltas: False
  n_mels: 80
  f_min: 0
  f_max: null
  n_fft: 512
  win_length: 25
  hop_length: 10
  left_frames: 0
  right_frames: 0

audio_processor_normalizer:
  _target_: torch.nn.Identity

audio_encoder:
  _target_: torch.nn.Sequential
  _args_:
    - _target_: src.utils.hf_utils.load_wespeaker_model
      model_name: resnet34
      local_ckpt_path: "/home/ahmad/adversarial-robustness-for-sr/logs/train/runs/2026-02-06_00-04-45/checkpoints/averaged_top5.ckpt"
      model_args:
        feat_dim: 80
        embed_dim: 256
        pooling_func: TSTP
        two_emb_layer: false
    - _target_: src.utils.torch_utils.SelectFromTuple
      _args_: [1]

classifier:
  _target_: src.utils.hf_utils.load_pretrained_classifier
  ckpt_path: ${module.model.audio_encoder._args_[0].local_ckpt_path}
  input_size: 256
  out_neurons: ${datamodule.num_classes}
