# AS-Norm scoring configuration (WeSpeaker-style)
#
# Adaptive Symmetric Normalization with mean centering.
# This is the recommended configuration for speaker verification
# when you have a cohort dataset available.
#
# How it works:
# 1. Cohort embeddings are averaged per speaker
# 2. Mean vector computed from speaker-averaged cohort
# 3. All embeddings (enroll, test, cohort) are centered
# 4. Raw cosine similarity computed
# 5. AS-Norm applied using top-K most similar cohort speakers

enrollment_aggregation: length_weighted
mean_source: cohort
norm_method: as_norm

cohort:
  speaker_level: true
  topk_speakers: 600
  min_size: 100
  max_size: null
